services:
  reporte-guardias:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reporte_guardias
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HEADLESS: "true"
      PERSIST_SESSION: "true"
      SESSION_FILE: /app/.session/crew-storage-state.json
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    expose:
      - "3000"
    volumes:
      - "${SESSION_DIR:-./.session}:/app/.session"
